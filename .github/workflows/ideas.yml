name: Signal weekly ideas

on:
  schedule:
    # Monday 06:00 UTC = 07:00 CET / 08:00 CEST
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: signal-ideas
  cancel-in-progress: false

jobs:
  ideas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ideas
        id: ideas
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m radar ideas

      - name: Commit weekly digest
        if: always()
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add digests/ _workdir/scored/ _workdir/ideas/ || true
          if git diff --cached --quiet; then
            echo "No new ideas digest to commit."
          else
            STATUS="${{ steps.ideas.outcome }}"
            ISOWEEK=$(date -u +%G-W%V)
            git commit -m "ideas: $ISOWEEK [$STATUS]"
            git push
          fi
