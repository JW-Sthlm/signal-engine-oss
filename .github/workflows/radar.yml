name: Signal daily radar

on:
  schedule:
    # 06:30 UTC = 07:30 CET (winter) / 08:30 CEST (summer)
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: signal-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run radar
        id: radar
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m radar run

      - name: Commit digest
        if: always()
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add digests/ _workdir/scored/ || true
          if git diff --cached --quiet; then
            echo "No new digest to commit."
          else
            STATUS="${{ steps.radar.outcome }}"
            git commit -m "digest: $(date -u +%Y-%m-%d) [$STATUS]"
            git push
          fi
